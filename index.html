<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glow Cart Co.</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fdfdfd;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px 40px;
      background: #000;
      color: #fff;
    }

    header img {
      height: 50px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .hero {
      text-align: center;
      padding: 60px 20px;
      background: linear-gradient(to right, #ff9a9e, #fad0c4);
      color: #000;
    }

    .hero h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 40px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      padding: 20px;
      text-align: center;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .price {
      font-size: 20px;
      margin: 10px 0;
      color: #333;
    }

    .btn {
      display: inline-block;
      padding: 10px 20px;
      background: #ff4d6d;
      color: #fff;
      text-decoration: none;
      border-radius: 25px;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      background: #e60039;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #000;
      color: #fff;
    }
  </style>
</head>
<body>

<header>
  <div class="brand">
    <img src="https://i.imgur.com/2ufCrUp.png" alt="Logo">
    <h2>GLOW CART CO.</h2>
  </div>
  <div>Email: mdmuneeb077@gmail.com</div>
</header>

<section class="hero">
  <h1>WELCOME TO GLOW CART CO.</h1>
  <p>Your one-stop shop for Beauty & Fashion products</p>
</section>

<section class="products">

  <div class="card">
    <img src="https://via.placeholder.com/300x200" alt="Product">
    <h3>Beauty Product 1</h3>
    <div class="price">$25</div>
    <a href="#" class="btn">BUY NOW ON AMAZON</a>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/300x200" alt="Product">
    <h3>Fashion Item 1</h3>
    <div class="price">$40</div>
    <a href="#" class="btn">BUY NOW ON AMAZON</a>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/300x200" alt="Product">
    <h3>Beauty Product 2</h3>
    <div class="price">$30</div>
    <a href="#" class="btn">BUY NOW ON AMAZON</a>
  </div>

</section>

<footer>
  <p>© 2026 Glow Cart Co. All Rights Reserved</p>
</footer>

</body>
</html>
